{% extends "base.html" %}
{% block title %}Histórico — BarberPro{% endblock %}

{% block content %}
<div class="page-title">
  <span class="title-icon">📋</span>
  Histórico
</div>

<!-- Filter bar -->
<div class="section-card">
  <div class="section-header">🗓️ Filtrar por Período</div>
  <div style="padding:16px">
    <div class="filter-bar">
      <div class="form-group">
        <label class="form-label" for="inicio-date">De</label>
        <input class="form-control" type="date" id="inicio-date" />
      </div>
      <div class="form-group">
        <label class="form-label" for="fim-date">Até</label>
        <input class="form-control" type="date" id="fim-date" />
      </div>
      <button class="btn btn-gold" id="btn-filtrar">
        🔍 Filtrar
      </button>
    </div>

    <!-- Totals -->
    <div style="display:flex;gap:16px;flex-wrap:wrap;padding-top:4px">
      <div>
        <span style="font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)">Total do período</span>
        <div style="font-family:'Montserrat',sans-serif;font-size:1.4rem;font-weight:800;color:var(--gold)" id="total-periodo">R$ —</div>
      </div>
      <div>
        <span style="font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)">Quantidade</span>
        <div style="font-family:'Montserrat',sans-serif;font-size:1.4rem;font-weight:800" id="qtd-periodo">—</div>
      </div>
    </div>
  </div>
</div>

<!-- Table -->
<div class="section-card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Cliente</th>
          <th>Serviço</th>
          <th>Valor</th>
        </tr>
      </thead>
      <tbody id="tbody-historico">
        <tr>
          <td colspan="4" class="loading-overlay">
            <span class="spinner"></span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
