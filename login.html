<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — BarberPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <span style="font-size:2.5rem">✂️</span>
      <div class="auth-logo-text">Barber<span>Pro</span></div>
      <div class="auth-subtitle">Faça login para acessar sua barbearia</div>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert-{{ 'error' if cat == 'error' else 'success' }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login" autocomplete="on" id="form-login">
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input class="form-control" type="email" id="email" name="email"
               placeholder="seu@email.com" required autofocus autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <div class="password-wrap">
          <input class="form-control" type="password" id="senha" name="senha"
                 placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="show-pwd" onclick="togglePwd()" title="Mostrar senha">👁</button>
        </div>
      </div>

      <button class="btn btn-gold btn-full" type="submit" id="btn-login" style="padding:16px;margin-top:8px">
        Entrar
      </button>
    </form>

    <div class="divider" style="margin:28px 0 20px"></div>

    <div style="text-align:center">
      <span style="font-size:0.8rem; color:var(--text-muted); text-transform:uppercase; font-weight:600; letter-spacing:1px">Novo por aqui?</span>
      <div style="display:flex; flex-direction:column; gap:10px; margin-top:14px">
        <a href="/cadastro-barbearia" class="btn btn-outline" style="border-color:var(--gold); color:var(--gold)">
          💈 Criar minha Barbearia
        </a>
        <a href="/cadastro-barbeiro" class="btn btn-outline">
          ✂️ Sou Barbeiro (Entrar em equipe)
        </a>
      </div>
    </div>
  </div>

  <script>
    function togglePwd() {
      const i = document.getElementById('senha');
      i.type = i.type === 'password' ? 'text' : 'password';
    }
    document.getElementById('form-login')?.addEventListener('submit', function() {
      const btn = document.getElementById('btn-login');
      btn.textContent = 'Entrando…';
      btn.disabled = true;
    });
  </script>
</body>
</html>
