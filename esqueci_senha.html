<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/png" href="logoapp.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esqueci minha senha — BarberPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <span style="font-size:2.5rem">🔑</span>
      <div class="auth-logo-text">Barber<span>Pro</span></div>
      <div class="auth-subtitle">Informe seu e-mail para redefinir sua senha</div>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert-{{ 'error' if cat == 'error' else 'success' }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/esqueci-senha" autocomplete="on" id="form-reset">
      <div class="form-group">
        <label class="form-label" for="email">E-mail cadastrado</label>
        <input class="form-control" type="email" id="email" name="email"
               placeholder="seu@email.com" required autofocus autocomplete="email" />
      </div>

      <button class="btn btn-gold btn-full" type="submit" id="btn-reset" style="padding:16px;margin-top:8px">
        📧 Enviar link de redefinição
      </button>
    </form>

    <div class="divider" style="margin:28px 0 20px"></div>

    <div style="text-align:center">
      <a href="/login" style="color:var(--gold); text-decoration:none; font-size:0.9rem; font-weight:600">
        ← Voltar para o Login
      </a>
    </div>
  </div>

  <script>
    document.getElementById('form-reset')?.addEventListener('submit', function() {
      const btn = document.getElementById('btn-reset');
      btn.textContent = 'Enviando…';
      btn.disabled = true;
    });
  </script>
</body>
</html>
