<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Barbearia — BarberPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo" style="margin-bottom:20px">
      <span style="font-size:2.5rem">💈</span>
      <div class="auth-logo-text" style="font-size:1.4rem">Nova Barbearia</div>
      <div class="auth-subtitle">Crie seu espaço no BarberPro</div>
    </div>

    {% if erros %}
    <div class="alert-error">
      {% for e in erros %}<div>• {{ e }}</div>{% endfor %}
    </div>
    {% endif %}

    <form method="POST" action="/cadastro-barbearia" autocomplete="off">
      <div class="auth-section-label">🏪 Sobre a Barbearia</div>
      <div class="form-group">
        <label class="form-label" for="nome_barbearia">Nome da Barbearia *</label>
        <input class="form-control" type="text" id="nome_barbearia" name="nome_barbearia"
               value="{{ form.get('nome_barbearia','') }}"
               placeholder="Ex: Barbearia do João" required autofocus />
      </div>

      <div class="auth-section-label" style="margin-top:20px">👤 Conta de Administrador</div>
      <div class="form-group">
        <label class="form-label" for="nome">Seu Nome *</label>
        <input class="form-control" type="text" id="nome" name="nome"
               value="{{ form.get('nome','') }}"
               placeholder="Ex: João Silva" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">E-mail *</label>
        <input class="form-control" type="email" id="email" name="email"
               value="{{ form.get('email','') }}"
               placeholder="joao@email.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="senha">Senha *</label>
        <div class="password-wrap">
          <input class="form-control" type="password" id="senha" name="senha"
                 placeholder="Mín. 6 caracteres" required minlength="6" />
          <button type="button" class="show-pwd" onclick="togglePwd('senha')" title="Mostrar">👁</button>
        </div>
      </div>

      <button class="btn btn-gold btn-full" type="submit" style="margin-top:12px;padding:16px">
        🚀 Criar Barbearia
      </button>
      
      <div style="text-align:center; margin-top:20px; font-size:0.85rem">
        <a href="/login" style="color:var(--text-muted); text-decoration:none">← Voltar para o Login</a>
      </div>
    </form>
  </div>

  <script>
    function togglePwd(id) {
      const i = document.getElementById(id);
      i.type = i.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
