<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Barbeiro — BarberPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo" style="margin-bottom:20px">
      <span style="font-size:2.5rem">✂️</span>
      <div class="auth-logo-text" style="font-size:1.4rem">Entrar na Equipe</div>
      <div class="auth-subtitle">Junte-se a uma barbearia existente</div>
    </div>

    {% if erros %}
    <div class="alert-error">
      {% for e in erros %}<div>• {{ e }}</div>{% endfor %}
    </div>
    {% endif %}

    <form method="POST" action="/cadastro-barbeiro" autocomplete="off">
      <div class="form-group" style="margin-bottom:24px">
        <label class="form-label" for="codigo" style="color:var(--white)">Código da Barbearia *</label>
        <span style="display:block; font-size:0.75rem; color:var(--text-muted); margin-bottom:8px">Peça este código ao administrador da barbearia.</span>
        <input class="form-control" type="text" id="codigo" name="codigo"
               value="{{ form.get('codigo','') }}"
               placeholder="Ex: XYZ123" required autofocus style="text-transform:uppercase; font-family:monospace; letter-spacing:2px; font-size:1.1rem; text-align:center" />
      </div>

      <div class="auth-section-label">👤 Seus Dados</div>
      <div class="form-group">
        <label class="form-label" for="nome">Seu Nome *</label>
        <input class="form-control" type="text" id="nome" name="nome"
               value="{{ form.get('nome','') }}"
               placeholder="Ex: Carlos Silva" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">E-mail *</label>
        <input class="form-control" type="email" id="email" name="email"
               value="{{ form.get('email','') }}"
               placeholder="carlos@email.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="senha">Senha *</label>
        <div class="password-wrap">
          <input class="form-control" type="password" id="senha" name="senha"
                 placeholder="Mín. 6 caracteres" required minlength="6" />
          <button type="button" class="show-pwd" onclick="togglePwd('senha')" title="Mostrar">👁</button>
        </div>
      </div>

      <button class="btn btn-gold btn-full" type="submit" style="margin-top:12px;padding:16px">
        Cadastrar como Barbeiro
      </button>
      
      <div style="text-align:center; margin-top:20px; font-size:0.85rem">
        <a href="/login" style="color:var(--text-muted); text-decoration:none">← Já tem conta? Faça login</a>
      </div>
    </form>
  </div>

  <script>
    function togglePwd(id) {
      const i = document.getElementById(id);
      i.type = i.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
